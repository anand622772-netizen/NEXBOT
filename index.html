<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexBot — AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #03060f;
      --card:     #080f1e;
      --border:   #0f1f3d;
      --accent:   #3b82f6;
      --cyan:     #06b6d4;
      --green:    #10b981;
      --purple:   #8b5cf6;
      --text:     #e2eeff;
      --muted:    #4a6080;
      --userbg:   #0f2347;
      --botbg:    #080f1e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ═══════════════════════════════════
       WELCOME PAGE
    ═══════════════════════════════════ */
    #welcome-page {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      overflow: hidden;
    }

    /* animated background orbs */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.15; pointer-events: none;
    }
    .orb1 { width: 500px; height: 500px; background: #1d4ed8; top: -150px; left: -150px; animation: floatOrb 8s ease-in-out infinite; }
    .orb2 { width: 400px; height: 400px; background: #0891b2; bottom: -100px; right: -100px; animation: floatOrb 10s ease-in-out infinite reverse; }
    .orb3 { width: 300px; height: 300px; background: #7c3aed; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: floatOrb 6s ease-in-out infinite 2s; }

    @keyframes floatOrb {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    /* grid lines */
    #welcome-page::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .welcome-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 20px;
      animation: fadeInUp 0.8s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* logo */
    .w-logo {
      width: 80px; height: 80px; border-radius: 22px;
      background: linear-gradient(135deg, #1e40af, #0e7490);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      box-shadow: 0 0 50px rgba(59,130,246,0.4), 0 0 0 1px rgba(59,130,246,0.2);
      margin-bottom: 28px;
      animation: pulseLogo 3s ease-in-out infinite;
    }

    @keyframes pulseLogo {
      0%,100% { box-shadow: 0 0 50px rgba(59,130,246,0.4), 0 0 0 1px rgba(59,130,246,0.2); }
      50% { box-shadow: 0 0 80px rgba(59,130,246,0.6), 0 0 0 1px rgba(59,130,246,0.4); }
    }

    .w-tag {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--cyan); letter-spacing: 3px; text-transform: uppercase;
      background: rgba(6,182,212,0.08); border: 1px solid rgba(6,182,212,0.2);
      padding: 5px 16px; border-radius: 20px;
      margin-bottom: 20px;
    }

    .w-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(38px, 10vw, 64px);
      font-weight: 700; line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .w-title .grad {
      background: linear-gradient(135deg, #60a5fa, #06b6d4, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200%;
      animation: gradShift 4s ease infinite;
    }

    @keyframes gradShift {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .w-subtitle {
      font-size: 15px; color: var(--muted); max-width: 360px;
      line-height: 1.6; margin-bottom: 40px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* feature pills */
    .w-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-bottom: 44px;
    }

    .w-pill {
      font-size: 11.5px; font-family: 'JetBrains Mono', monospace;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted); background: rgba(255,255,255,0.02);
      display: flex; align-items: center; gap: 6px;
    }

    .w-pill .pip { width: 6px; height: 6px; border-radius: 50%; }

    /* start button */
    .start-btn {
      position: relative;
      padding: 16px 48px;
      font-size: 16px; font-weight: 600;
      font-family: 'Outfit', sans-serif;
      color: #fff; border: none; border-radius: 14px;
      cursor: pointer; overflow: hidden;
      background: linear-gradient(135deg, #1d4ed8, #0891b2);
      box-shadow: 0 8px 32px rgba(29,78,216,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.3px;
    }

    .start-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.2s;
    }

    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(29,78,216,0.5); }
    .start-btn:hover::before { opacity: 1; }
    .start-btn:active { transform: translateY(0); }

    .start-btn .arrow { margin-left: 8px; transition: transform 0.2s; display: inline-block; }
    .start-btn:hover .arrow { transform: translateX(4px); }

    /* ═══════════════════════════════════
       CHAT PAGE
    ═══════════════════════════════════ */
    #chat-page {
      display: none;
      flex-direction: column;
      height: 100vh;
      position: fixed; inset: 0;
    }

    #chat-page.active { display: flex; }

    /* page enter animation */
    @keyframes slideInPage {
      from { opacity: 0; transform: scale(0.97) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    #chat-page.active { animation: slideInPage 0.4s cubic-bezier(.22,.68,0,1.2) forwards; }

    /* chat background */
    #chat-page::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: rgba(8,15,30,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .t-left { display: flex; align-items: center; gap: 12px; }

    .t-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #1e40af, #0e7490);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }

    .t-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 17px; font-weight: 600;
      background: linear-gradient(90deg, #60a5fa, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .t-sub {
      font-size: 10.5px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .t-right { display: flex; gap: 8px; align-items: center; }

    .t-badge {
      font-size: 10.5px; font-family: 'JetBrains Mono', monospace;
      padding: 4px 11px; border-radius: 20px;
      border: 1px solid; 
    }

    .badge-green { color: var(--green); border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.08); }
    .badge-blue  { color: var(--accent); border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); }

    .back-btn {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--muted); background: transparent;
      border: 1px solid var(--border); padding: 5px 11px;
      border-radius: 8px; cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── MESSAGES ── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      position: relative; z-index: 1;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      display: flex; gap: 10px; align-items: flex-end;
      animation: msgPop 0.28s cubic-bezier(.22,.68,0,1.2);
    }

    @keyframes msgPop {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }

    .msg.user { flex-direction: row-reverse; }

    .av {
      width: 30px; height: 30px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    .msg.bot  .av { background: #0a1628; border: 1px solid rgba(59,130,246,0.2); }
    .msg.user .av { background: #0a1628; border: 1px solid rgba(6,182,212,0.2); }

    .msg-body { max-width: 76%; display: flex; flex-direction: column; gap: 4px; }
    .msg.user .msg-body { align-items: flex-end; }

    .bubble {
      padding: 11px 15px; border-radius: 16px;
      font-size: 14px; line-height: 1.65;
    }

    .msg.bot .bubble {
      background: var(--botbg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .msg.user .bubble {
      background: var(--userbg);
      border: 1px solid rgba(59,130,246,0.15);
      border-bottom-right-radius: 3px;
    }

    .meta {
      font-size: 10px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      display: flex; gap: 6px; align-items: center;
    }

    .conf { padding: 1px 7px; border-radius: 10px; font-size: 10px; }
    .conf.hi  { background: rgba(16,185,129,0.1);  color: var(--green); }
    .conf.mid { background: rgba(251,191,36,0.1);  color: #fbbf24; }
    .conf.lo  { background: rgba(239,68,68,0.1);   color: #f87171; }

    /* typing */
    .tdots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
    .tdots span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      animation: td 1.3s infinite ease-in-out;
    }
    .tdots span:nth-child(2) { animation-delay: .18s; }
    .tdots span:nth-child(3) { animation-delay: .36s; }
    @keyframes td {
      0%,80%,100% { transform: scale(1);   opacity: .4; }
      40%          { transform: scale(1.4); opacity: 1;  }
    }

    /* suggestions */
    .sugs {
      display: flex; flex-wrap: wrap; gap: 7px;
      padding: 0 16px 10px;
      position: relative; z-index: 1; flex-shrink: 0;
    }

    .sug {
      font-size: 11.5px; font-family: 'JetBrains Mono', monospace;
      padding: 5px 13px; border-radius: 20px;
      border: 1px solid var(--border); color: var(--muted);
      background: transparent; cursor: pointer;
      transition: all .2s;
    }

    .sug:hover {
      border-color: var(--accent); color: var(--accent);
      background: rgba(59,130,246,0.07);
    }

    /* ── INPUT ── */
    .input-row {
      padding: 12px 14px;
      background: rgba(8,15,30,0.95);
      border-top: 1px solid var(--border);
      display: flex; gap: 9px; align-items: center;
      position: relative; z-index: 10; flex-shrink: 0;
      backdrop-filter: blur(12px);
    }

    .inp {
      flex: 1; background: rgba(3,6,15,0.8);
      border: 1.5px solid var(--border);
      border-radius: 12px; padding: 11px 15px;
      color: var(--text); font-size: 14px;
      font-family: 'Outfit', sans-serif;
      outline: none; transition: border-color .2s;
    }

    .inp:focus { border-color: var(--accent); }
    .inp::placeholder { color: var(--muted); }

    .sendbtn {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #1d4ed8, #0891b2);
      border: none; cursor: pointer; color: #fff;
      font-size: 17px; display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .15s; flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(29,78,216,0.3);
    }

    .sendbtn:hover:not(:disabled) { opacity: .85; transform: scale(1.05); }
    .sendbtn:disabled { opacity: .3; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ═══════════════════════════ WELCOME PAGE ═══════════════════════════ -->
<div id="welcome-page">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="welcome-content">
    <div class="w-logo">🤖</div>
    <div class="w-tag">Chatbot Project</div>
    <h1 class="w-title">
      Meet <span class="grad">NexBot</span>
    </h1>
    <p class="w-subtitle">
      Trained on custom dataset using<br/>TF-IDF Vectorization
    </p>

    <div class="w-pills">
      <div class="w-pill"><span class="pip" style="background:#3b82f6"></span>Python + Flask</div>
      <div class="w-pill"><span class="pip" style="background:#06b6d4"></span>NLTK</div>
      <div class="w-pill"><span class="pip" style="background:#8b5cf6"></span>Scikit-learn</div>
      <div class="w-pill"><span class="pip" style="background:#10b981"></span>TF-IDF Model</div>
    </div>

    <button class="start-btn" onclick="startChat()">
      Start Asking <span class="arrow">→</span>
    </button>
  </div>
</div>

<!-- ═══════════════════════════ CHAT PAGE ═══════════════════════════ -->
<div id="chat-page">

  <div class="topbar">
    <div class="t-left">
      <div class="t-icon">🤖</div>
      <div>
        <div class="t-name">NexBot</div>
        <div class="t-sub">TF-IDF · NLTK · Python</div>
      </div>
    </div>
    <div class="t-right">
      <span class="t-badge badge-green">● Online</span>
      <span class="t-badge badge-blue">Trained</span>
      <button class="back-btn" onclick="goBack()">← Home</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="av">🤖</div>
      <div class="msg-body">
        <div class="bubble">Hey! I'm <strong>NexBot</strong> 👋 Ask me anything about IT, programming, machine learning, or college subjects!</div>
        <div class="meta">NexBot · just now</div>
      </div>
    </div>
  </div>

  <div class="sugs" id="sugs">
    <button class="sug" onclick="ask('What is machine learning?')">Machine Learning</button>
    <button class="sug" onclick="ask('What is TF-IDF?')">TF-IDF</button>
    <button class="sug" onclick="ask('Difference between TCP and UDP')">TCP vs UDP</button>
    <button class="sug" onclick="ask('What is normalization?')">Normalization</button>
    <button class="sug" onclick="ask('What is cosine similarity?')">Cosine Similarity</button>
  </div>

  <div class="input-row">
    <input class="inp" id="inp" placeholder="Type your message..." autocomplete="off"/>
    <button class="sendbtn" id="sendbtn" onclick="send()">➤</button>
  </div>

</div>

<script>
  // ── Page transitions ──
  function startChat() {
    const wp = document.getElementById("welcome-page");
    const cp = document.getElementById("chat-page");
    wp.style.opacity = "0";
    wp.style.transform = "scale(1.03)";
    wp.style.transition = "all 0.35s ease";
    setTimeout(() => {
      wp.style.display = "none";
      cp.style.display = "flex";
      cp.classList.add("active");
      document.getElementById("inp").focus();
    }, 350);
  }

  function goBack() {
    const cp = document.getElementById("chat-page");
    const wp = document.getElementById("welcome-page");
    cp.classList.remove("active");
    cp.style.display = "none";
    wp.style.display = "flex";
    wp.style.opacity = "1";
    wp.style.transform = "scale(1)";
    wp.style.transition = "none";
  }

  // ── Chat logic ──
  const box = document.getElementById("messages");
  const inp = document.getElementById("inp");
  const btn = document.getElementById("sendbtn");

  inp.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

  function now() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function confBadge(c) {
    if (!c && c !== 0) return "";
    const cls = c >= 55 ? "hi" : c >= 25 ? "mid" : "lo";
    return `<span class="conf ${cls}">${c}%</span>`;
  }

  function addMsg(text, who, conf) {
    const d = document.createElement("div");
    d.className = `msg ${who}`;
    const icon = who === "bot" ? "🤖" : "👤";
    const name = who === "bot" ? "NexBot" : "You";
    d.innerHTML = `
      <div class="av">${icon}</div>
      <div class="msg-body">
        <div class="bubble">${text}</div>
        <div class="meta">${name} · ${now()} ${who === "bot" ? confBadge(conf) : ""}</div>
      </div>`;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  }

  function showTyping() {
    const d = document.createElement("div");
    d.className = "msg bot"; d.id = "typing";
    d.innerHTML = `
      <div class="av">🤖</div>
      <div class="msg-body">
        <div class="bubble"><div class="tdots"><span></span><span></span><span></span></div></div>
      </div>`;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function send(text) {
    const msg = (text || inp.value).trim();
    if (!msg) return;
    addMsg(msg, "user");
    inp.value = ""; btn.disabled = true;
    document.getElementById("sugs").style.display = "none";
    showTyping();
    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      removeTyping();
      addMsg(data.response, "bot", data.confidence);
    } catch {
      removeTyping();
      addMsg("Something went wrong. Please try again.", "bot");
    } finally {
      btn.disabled = false; inp.focus();
    }
  }

  function ask(q) { send(q); }
</script>
</body>
</html>
